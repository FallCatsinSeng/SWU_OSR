services:
  # ─────────────────────────────────────────────────────
  # Prometheus — Metrics collection
  # ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - internal
    ports:
      # Security: bind ke localhost saja — TIDAK boleh diakses dari internet publik
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  # Grafana — Dashboards & visualization
  # ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # WAJIB: set env var ini sebelum menjalankan monitoring stack
      # Generate strong password: openssl rand -base64 24
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Error: GRAFANA_ADMIN_PASSWORD env var must be set}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
      # Security: matikan telemetry ke Grafana Labs
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal
    ports:
      # Security: bind ke localhost saja — TIDAK boleh diakses dari internet publik
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
