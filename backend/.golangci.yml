---
# golangci-lint configuration for SWU_OSR backend
# Run with: golangci-lint run ./...

run:
  timeout: 5m
  tests: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  govet:
    enable-all: true
    disable:
      - fieldalignment  # Not critical for correctness

  staticcheck:
    checks:
      - "all"
      - "-SA1019"  # Allow deprecated usages if intentional

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G115  # integer overflow (too noisy for business logic)

  misspell:
    locale: US

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/FallCatsinSeng/SWU_OSR

  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - hugeParam      # Allow large structs in function params

  cyclop:
    max-complexity: 30

  funlen:
    lines: 150
    statements: 100

  lll:
    line-length: 180

linters:
  disable-all: true
  enable:
    # Core correctness
    - errcheck
    - govet
    - staticcheck
    - unused

    # Security
    - gosec

    # Style / formatting
    - gofmt
    - goimports
    - misspell
    - whitespace

    # Code quality
    - gocritic
    - cyclop
    - funlen
    - lll
    - bodyclose
    - noctx

issues:
  exclude-rules:
    # Allow long lines in test files
    - path: "_test.go"
      linters:
        - lll
        - funlen

    # Allow complexity in main.go wiring
    - path: "cmd/api/main.go"
      linters:
        - funlen
        - cyclop

    # Allow errcheck for logger.Sync() deferred calls
    - text: "Error return value of `.*\\.Sync\\(\\)` is not checked"
      linters:
        - errcheck

    # Allow unchecked errors in test cleanup
    - path: "_test.go"
      text: "Error return value"
      linters:
        - errcheck

  max-issues-per-linter: 50
  max-same-issues: 10
