worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 80;
        server_name _;

        # Use Docker's embedded DNS resolver so hostnames resolve at request time
        # (not just at nginx startup). valid=10s caches results for 10 seconds.
        resolver 127.0.0.11 valid=10s;

        # Store upstream addresses in variables — this forces nginx to resolve
        # them via the resolver directive above instead of at config load time.
        set $backend_upstream http://backend:8080;
        set $frontend_upstream http://frontend:3000;

        # Uploaded banner files — served directly by nginx for performance.
        # Security: Only serves specific media types, no directory listing,
        # immutable caching (filenames are random hashes so content never changes).
        #
        # Regex location matches ONLY allowed media extensions under /uploads/banners/.
        # Any request that doesn't match these extensions falls through to the
        # catch-all /uploads/ block which returns 403.
        location ~ ^/uploads/banners/([a-f0-9]+\.(jpg|jpeg|png|webp|gif|mp4|webm))$ {
            alias /data/uploads/banners/$1;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Deny any other request under /uploads/ (no extension match, directory listing, etc.)
        location /uploads/ {
            return 403;
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Health check
        location /health {
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend routes
        location / {
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
