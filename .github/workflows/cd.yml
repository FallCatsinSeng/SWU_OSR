name: CD to VPS

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Hanya jalan jika CI sukses (jika dijalankan via workflow_run) atau via push langsung
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }} # Biasanya 22
          script: |
            # Pindah ke direktori proyek (sesuaikan path ini melalui rahasia atau hardcode jika pasti)
            cd ${{ secrets.PROJECT_PATH }}
            
            echo "1. Menarik kode terbaru dari GitHub..."
            git pull origin main
            
            echo "2. Build ulang Docker images..."
            # Asumsi menggunakan docker-compose.ssl.yml hasil generate dari deploy.sh
            sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ssl.yml build
            
            echo "3. Menjalankan container dengan kode terbaru..."
            sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ssl.yml up -d
            
            echo "4. Membersihkan image Docker yang tidak terpakai (dangling)..."
            sudo docker image prune -f
            
            echo "Deployment Selesai!"
