name: CD to VPS

on:
  # Deploy hanya dipicu saat GitHub Release baru dipublish oleh semantic-release
  # Ini memastikan versi yang ter-deploy ke VPS selalu punya tag yang jelas (misal: v1.2.3)
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Hanya jalan di upstream, bukan fork (konsisten dengan release.yml)
    if: github.repository == 'HMPSTI-SWU/SWU_OSR'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}

            echo "=== Deploy Release ${{ github.event.release.tag_name }} ==="

            echo "1. Menarik kode terbaru dari GitHub..."
            git fetch --tags
            git checkout ${{ github.event.release.tag_name }}

            echo "2. Build ulang Docker images..."
            sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ssl.yml build

            echo "3. Menjalankan container dengan kode terbaru..."
            sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ssl.yml up -d

            echo "4. Membersihkan image Docker yang tidak terpakai (dangling)..."
            sudo docker image prune -f

            echo "=== Deployment ${{ github.event.release.tag_name }} Selesai! ==="
